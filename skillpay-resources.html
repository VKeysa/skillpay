<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillPay — Resources</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1B2A;--navy-mid:#1A2E45;--navy-light:#243B55;
  --gold:#C9933A;--gold-light:#E8B86D;
  --cream:#F9F5EF;--cream-dark:#EDE8DF;
  --white:#FFFFFF;--muted:#7A8A9A;--body:#2C3E50;--border:#DDD8CE;
  --green:#1D9E75;--purple:#534AB7;--blue:#185FA5;--danger:#E24B4A;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--body);font-size:15px;min-height:100vh}
h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.2}

.app-layout{display:grid;grid-template-columns:220px 1fr;min-height:100vh}
.sidebar{background:var(--navy);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sidebar-logo{font-family:'Playfair Display',serif;color:var(--white);font-size:18px;font-weight:700;padding:24px 20px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sidebar-logo span{color:var(--gold)}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;font-size:13px;color:rgba(255,255,255,0.55);cursor:pointer;transition:all 0.15s;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.85)}
.nav-item.active{background:rgba(201,147,58,0.15);color:var(--gold-light)}
.nav-icon{width:16px;height:16px;flex-shrink:0}
.sidebar-user{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.07)}
.user-row{display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--white);flex-shrink:0}
.user-name{font-size:13px;color:rgba(255,255,255,0.8);font-weight:500}
.user-plan{font-size:11px;color:rgba(255,255,255,0.35);margin-top:2px}

.store-main{padding:36px;overflow-y:auto}
.page-header{margin-bottom:28px}
.page-header h2{font-size:28px;color:var(--navy);margin-bottom:4px}
.page-header p{font-size:14px;color:var(--muted);font-weight:300}

/* Filter */
.store-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.sf-btn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid var(--border);background:var(--white);color:var(--muted);cursor:pointer;transition:all 0.15s;font-family:'DM Sans',sans-serif}
.sf-btn:hover{border-color:var(--navy);color:var(--navy)}
.sf-btn.active{background:var(--navy);color:var(--white);border-color:var(--navy)}

/* Stats */
.store-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.store-stat{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px;text-align:center}
.store-stat-val{font-family:'Playfair Display',serif;font-size:24px;color:var(--navy);font-weight:700}
.store-stat-label{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}

/* Resource grid */
.resource-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.resource-card{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all 0.2s;display:flex;flex-direction:column}
.resource-card:hover{box-shadow:0 6px 24px rgba(13,27,42,0.08);transform:translateY(-2px)}
.resource-thumb{height:120px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.resource-thumb-icon{font-size:36px;position:relative;z-index:1}
.resource-thumb-label{position:absolute;top:10px;left:10px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.5px;z-index:2}
.resource-thumb-label.free{background:rgba(29,158,117,0.15);color:#1D9E75}
.resource-thumb-label.paid{background:rgba(201,147,58,0.15);color:var(--gold)}
.resource-thumb-label.pro{background:linear-gradient(135deg,#C9933A,#E8B86D);color:#fff}
.resource-body{padding:18px;flex:1;display:flex;flex-direction:column}
.resource-cat{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:6px}
.resource-title{font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px;line-height:1.3}
.resource-desc{font-size:12px;color:var(--muted);font-weight:300;line-height:1.6;margin-bottom:14px;flex:1}
.resource-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.resource-price{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--navy)}
.resource-price.free{color:var(--green)}
.resource-price span{font-size:11px;color:var(--muted);font-weight:400;font-family:'DM Sans',sans-serif}
.resource-btn{padding:8px 16px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.resource-btn.download{background:var(--green);color:#fff}
.resource-btn.download:hover{background:#178A64}
.resource-btn.buy{background:var(--gold);color:#fff}
.resource-btn.buy:hover{background:var(--gold-light)}
.resource-btn.pro-only{background:var(--navy);color:#fff}
.resource-btn.pro-only:hover{background:var(--navy-mid)}

/* Preview modal */
.preview-overlay{position:fixed;inset:0;background:rgba(13,27,42,0.85);z-index:9999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.preview-overlay.show{display:flex}
.preview-modal{background:var(--white);border-radius:18px;max-width:560px;width:92%;max-height:85vh;overflow-y:auto;animation:modalIn 0.3s ease}
@keyframes modalIn{from{transform:scale(0.95);opacity:0}to{transform:scale(1);opacity:1}}
.preview-modal-header{padding:28px 28px 0;display:flex;justify-content:space-between;align-items:flex-start}
.preview-modal-header h3{font-size:20px;color:var(--navy);flex:1;margin-right:16px}
.preview-modal-close{width:32px;height:32px;border-radius:50%;background:var(--cream);border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0}
.preview-modal-close:hover{background:var(--cream-dark);color:var(--navy)}
.preview-modal-body{padding:20px 28px 28px}
.preview-modal-cat{font-size:11px;text-transform:uppercase;letter-spacing:0.8px;font-weight:600;margin-bottom:12px}
.preview-modal-desc{font-size:14px;color:var(--body);line-height:1.7;margin-bottom:20px}
.preview-modal-includes{margin-bottom:24px}
.preview-modal-includes h4{font-size:14px;color:var(--navy);margin-bottom:10px;font-family:'DM Sans',sans-serif;font-weight:600}
.pmi-item{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px;color:var(--body)}
.pmi-icon{width:20px;height:20px;border-radius:50%;background:rgba(29,158,117,0.1);color:var(--green);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.preview-modal-footer{display:flex;align-items:center;justify-content:space-between;padding-top:20px;border-top:1px solid var(--border)}
.preview-modal-price{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--navy)}
.preview-modal-price.free{color:var(--green)}
.preview-modal-btn{padding:12px 28px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s}
.preview-modal-btn.download{background:var(--green);color:#fff}
.preview-modal-btn.buy{background:var(--gold);color:#fff}

/* Interactive Tools */
.tool-form{padding:4px 0}
.tool-field{margin-bottom:14px}
.tool-field label{display:block;font-size:12px;font-weight:600;color:var(--navy);margin-bottom:5px}
.tool-field input,.tool-field select,.tool-field textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--body);outline:none;background:var(--white);transition:border-color 0.2s}
.tool-field input:focus,.tool-field select:focus,.tool-field textarea:focus{border-color:var(--gold)}
.tool-field textarea{resize:vertical;line-height:1.6}
.tool-generate{width:100%;padding:12px;background:var(--gold);color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background 0.2s;margin-top:4px}
.tool-generate:hover{background:var(--gold-light)}
.tool-output{margin-top:18px}
.tool-output:empty{display:none}
.tool-result{background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px}
.tool-result-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:8px}
.tool-result-text{font-size:13px;color:var(--body);line-height:1.7;white-space:pre-wrap;word-wrap:break-word}
.tool-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tool-stat{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.tool-stat-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--navy)}
.tool-stat-label{font-size:11px;color:var(--muted);margin-top:2px}
.tool-copy{margin-top:8px;padding:6px 14px;background:var(--navy);color:#fff;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:background 0.2s}
.tool-copy:hover{background:var(--gold)}
.resource-thumb-label.tool{background:rgba(83,74,183,0.15);color:#534AB7}
[data-theme="dark"] .tool-field input,[data-theme="dark"] .tool-field select,[data-theme="dark"] .tool-field textarea{background:#0D1117!important;border-color:#30363D!important;color:#F0F6FC!important}
[data-theme="dark"] .tool-field label{color:#F0F6FC!important}
[data-theme="dark"] .tool-result{background:#0D1117!important;border-color:#30363D!important}
[data-theme="dark"] .tool-result-title{color:#F0F6FC!important}
[data-theme="dark"] .tool-result-text{color:#C9D1D9!important}
[data-theme="dark"] .tool-stat{background:#1C2128!important;border-color:#30363D!important}
[data-theme="dark"] .tool-stat-val{color:#F0F6FC!important}

/* MOBILE NAV */
.mobile-nav{display:none;position:fixed;top:0;left:0;right:0;height:56px;background:var(--navy);z-index:999;padding:0 16px;align-items:center;justify-content:space-between}
.mobile-nav-logo{font-family:'Playfair Display',serif;color:#fff;font-size:18px;font-weight:700}
.mobile-nav-logo span{color:#C9933A}
.hamburger{width:36px;height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;background:none;border:none;padding:0}
.hamburger span{display:block;width:22px;height:2px;background:rgba(255,255,255,0.7);border-radius:1px;transition:all 0.3s}
.hamburger.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.mobile-menu{display:none;position:fixed;inset:0;top:56px;background:var(--navy);z-index:998;padding:20px;overflow-y:auto}
.mobile-menu.open{display:block}
.mobile-menu-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:10px;font-size:15px;color:rgba(255,255,255,0.65);cursor:pointer;transition:all 0.15s;margin-bottom:4px;text-decoration:none}
.mobile-menu-item:hover,.mobile-menu-item.active{background:rgba(201,147,58,0.15);color:#E8B86D}
.mobile-menu-item svg{width:18px;height:18px;flex-shrink:0}

/* Dark mode */
[data-theme="dark"]{--cream:#0D1117;--cream-dark:#161B22;--white:#1C2128;--body:#C9D1D9;--muted:#8B949E;--border:#30363D}
[data-theme="dark"] body{background:#0D1117;color:#C9D1D9}
[data-theme="dark"] h1,[data-theme="dark"] h2,[data-theme="dark"] h3,[data-theme="dark"] h4{color:#F0F6FC!important}
[data-theme="dark"] .resource-card{background:#1C2128!important;border-color:#30363D!important}
[data-theme="dark"] .resource-title{color:#F0F6FC!important}
[data-theme="dark"] .resource-price{color:#F0F6FC!important}
[data-theme="dark"] .store-stat{background:#1C2128!important;border-color:#30363D!important}
[data-theme="dark"] .store-stat-val{color:#F0F6FC!important}
[data-theme="dark"] .sf-btn{background:#1C2128!important;border-color:#30363D!important;color:#8B949E!important}
[data-theme="dark"] .sf-btn.active{background:#C9933A!important;color:#fff!important;border-color:#C9933A!important}
[data-theme="dark"] .preview-modal{background:#161B22!important}
[data-theme="dark"] .preview-modal-header h3{color:#F0F6FC!important}
[data-theme="dark"] .preview-modal-close{background:#1C2128!important;color:#8B949E!important}
[data-theme="dark"] .preview-modal-price{color:#F0F6FC!important}

@media(max-width:768px){
  .mobile-nav{display:flex}
  .sidebar{display:none!important}
  .app-layout{grid-template-columns:1fr!important}
  .store-main{padding:72px 16px 24px!important}
  .resource-grid{grid-template-columns:1fr!important}
  .store-stats{grid-template-columns:repeat(3,1fr)}
  .store-filters{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
}
</style>
</head>

function calculatePosition() {
  var balance = parseFloat(document.getElementById('tool-balance').value) || 0;
  var risk = parseFloat(document.getElementById('tool-risk').value) || 2;
  var entry = parseFloat(document.getElementById('tool-entry').value) || 0;
  var stop = parseFloat(document.getElementById('tool-stop').value) || 0;
  var profit = parseFloat(document.getElementById('tool-profit').value) || 0;
  if (!balance || !entry || !stop) { alert('Please fill in all fields.'); return; }
  var riskAmount = balance * (risk / 100);
  var stopDist = Math.abs(entry - stop);
  var shares = Math.floor(riskAmount / stopDist);
  var totalCost = shares * entry;
  var potentialLoss = shares * stopDist;
  var potentialGain = profit ? shares * Math.abs(profit - entry) : 0;
  var rr = potentialGain && potentialLoss ? (potentialGain / potentialLoss).toFixed(1) : 'N/A';
  var out = document.getElementById('tool-output');
  out.innerHTML = '<div class="tool-result">' +
    '<div class="tool-result-title">Position analysis</div>' +
    '<div class="tool-result-grid">' +
      '<div class="tool-stat"><div class="tool-stat-val">' + shares + '</div><div class="tool-stat-label">Shares/units to buy</div></div>' +
      '<div class="tool-stat"><div class="tool-stat-val">$' + riskAmount.toFixed(2) + '</div><div class="tool-stat-label">Max risk (' + risk + '%)</div></div>' +
      '<div class="tool-stat"><div class="tool-stat-val">$' + totalCost.toFixed(2) + '</div><div class="tool-stat-label">Total position cost</div></div>' +
      '<div class="tool-stat"><div class="tool-stat-val">' + rr + ':1</div><div class="tool-stat-label">Risk/reward ratio</div></div>' +
    '</div>' +
    '<div class="tool-result-text" style="margin-top:12px">Potential loss: <span style="color:#E24B4A">-$' + potentialLoss.toFixed(2) + '</span> | Potential gain: <span style="color:#1D9E75">+$' + potentialGain.toFixed(2) + '</span>' +
    (parseFloat(rr) < 2 && rr !== 'N/A' ? '\n\n⚠️ Risk/reward below 2:1 — consider widening your take profit or tightening your stop loss.' : parseFloat(rr) >= 3 ? '\n\n🌟 Excellent risk/reward ratio!' : '') + '</div></div>';
}

function checkRedFlags() {
  var msg = document.getElementById('tool-message').value.trim().toLowerCase();
  if (!msg) { alert('Please paste a client message or job posting.'); return; }
  var flags = [];
  var score = 100;
  if (msg.includes('exposure') || msg.includes('for free') || msg.includes('no budget')) { flags.push({flag: '🚩 Expects free work', detail: 'Mentions working for "exposure" or has no budget. Your time has value.', severity: 25}); }
  if (msg.includes('asap') || msg.includes('urgent') || msg.includes('need it today') || msg.includes('rush')) { flags.push({flag: '🚩 Unrealistic deadline', detail: 'Rushing you is a sign of poor planning. Rush = higher rate, always.', severity: 15}); }
  if (msg.includes('simple') || msg.includes('easy') || msg.includes('quick job') || msg.includes('shouldn\'t take long')) { flags.push({flag: '🚩 Downplays complexity', detail: 'Calling work "simple" or "easy" usually means they\'ll expect more than they\'re paying for.', severity: 15}); }
  if (msg.includes('test') || msg.includes('trial') || msg.includes('prove yourself')) { flags.push({flag: '🚩 Asks for unpaid trial', detail: 'Legitimate clients don\'t ask for free test work. Offer a paid trial instead.', severity: 20}); }
  if (!msg.includes('$') && !msg.includes('budget') && !msg.includes('rate') && !msg.includes('pay') && !msg.includes('compensation')) { flags.push({flag: '⚠️ No budget mentioned', detail: 'No discussion of payment could mean they\'re fishing for the cheapest option.', severity: 10}); }
  if (msg.includes('many revisions') || msg.includes('unlimited revision') || msg.includes('until perfect')) { flags.push({flag: '🚩 Unlimited revisions expected', detail: 'Always cap revisions in your contract (2-3 rounds is standard).', severity: 20}); }
  if (msg.length < 50) { flags.push({flag: '⚠️ Vague or low-effort message', detail: 'Short, vague messages often mean the client hasn\'t thought through what they need.', severity: 10}); }
  if (msg.includes('competitor') || msg.includes('copy') || msg.includes('replicate') || msg.includes('just like')) { flags.push({flag: '⚠️ Wants to copy someone else', detail: 'Copying competitors can lead to IP issues and usually means no creative freedom.', severity: 10}); }
  flags.forEach(function(f) { score -= f.severity; });
  score = Math.max(score, 0);
  var color = score >= 70 ? '#1D9E75' : score >= 40 ? '#C9933A' : '#E24B4A';
  var verdict = score >= 70 ? 'Looks safe — proceed with normal precautions.' : score >= 40 ? 'Some concerns — proceed carefully and set clear boundaries.' : 'High risk — consider declining or requiring upfront payment.';
  var out = document.getElementById('tool-output');
  out.innerHTML = '<div class="tool-result">' +
    '<div class="tool-result-title">Red Flag Analysis</div>' +
    '<div class="tool-result-grid"><div class="tool-stat"><div class="tool-stat-val" style="color:' + color + '">' + score + '/100</div><div class="tool-stat-label">Trust score</div></div></div>' +
    '<div class="tool-result-text" style="margin-top:12px">' + verdict + '</div>' +
    (flags.length > 0 ? flags.map(function(f) { return '<div style="padding:10px 0;border-bottom:1px solid var(--border)"><strong>' + f.flag + '</strong><br><span style="font-size:12px;color:var(--muted)">' + f.detail + '</span></div>'; }).join('') : '<div style="padding:10px 0;color:#1D9E75">✅ No red flags detected! This looks like a legitimate opportunity.</div>') +
    '</div>';
}

function copyToolText(btn) {
  var text = btn.previousElementSibling.textContent;
  navigator.clipboard.writeText(text).then(function() {
    btn.textContent = 'Copied!';
    btn.style.background = '#1D9E75';
    setTimeout(function() { btn.textContent = 'Copy'; btn.style.background = ''; }, 1500);
  });
}

function addExpenseEntry() {
  var type = document.getElementById('tool-type').value;
  var amount = parseFloat(document.getElementById('tool-amount').value) || 0;
  var desc = document.getElementById('tool-desc').value.trim();
  var category = document.getElementById('tool-category').value;
  
  if (!amount || !desc) { alert('Please fill in amount and description.'); return; }
  
  var entries = [];
  try { entries = JSON.parse(localStorage.getItem('skillpay_expense_tracker') || '[]'); } catch(e) {}
  
  entries.push({
    type: type,
    amount: amount,
    desc: desc,
    category: category,
    date: new Date().toISOString().split('T')[0]
  });
  
  localStorage.setItem('skillpay_expense_tracker', JSON.stringify(entries));
  
  // Clear form
  document.getElementById('tool-amount').value = '';
  document.getElementById('tool-desc').value = '';
  
  // Render tracker
  renderExpenseTracker(entries);
}

function renderExpenseTracker(entries) {
  var totalIncome = 0;
  var totalExpenses = 0;
  
  entries.forEach(function(e) {
    if (e.type === 'Income') totalIncome += e.amount;
    else totalExpenses += e.amount;
  });
  
  var profit = totalIncome - totalExpenses;
  var taxEstimate = profit > 0 ? profit * 0.25 : 0; // 25% tax estimate
  var netProfit = profit - taxEstimate;
  
  var out = document.getElementById('tool-output');
  var html = '<div class="tool-result"><div class="tool-result-title">Your side hustle summary</div>' +
    '<div class="tool-result-grid">' +
      '<div class="tool-stat"><div class="tool-stat-val" style="color:#1D9E75">$' + totalIncome.toFixed(2) + '</div><div class="tool-stat-label">Total income</div></div>' +
      '<div class="tool-stat"><div class="tool-stat-val" style="color:#E24B4A">$' + totalExpenses.toFixed(2) + '</div><div class="tool-stat-label">Total expenses</div></div>' +
      '<div class="tool-stat"><div class="tool-stat-val">$' + profit.toFixed(2) + '</div><div class="tool-stat-label">Profit</div></div>' +
      '<div class="tool-stat"><div class="tool-stat-val" style="color:#C9933A">$' + taxEstimate.toFixed(2) + '</div><div class="tool-stat-label">Tax estimate (25%)</div></div>' +
    '</div>' +
    '<div class="tool-result-text" style="margin-top:12px;font-weight:600;color:' + (netProfit >= 0 ? '#1D9E75' : '#E24B4A') + '">Net profit after taxes: $' + netProfit.toFixed(2) + '</div></div>';
  
  // Recent entries
  html += '<div class="tool-result"><div class="tool-result-title">Recent entries (' + entries.length + ' total)</div>';
  entries.slice(-5).reverse().forEach(function(e) {
    var color = e.type === 'Income' ? '#1D9E75' : '#E24B4A';
    html += '<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">' +
      '<div><div style="font-size:13px;color:var(--navy);font-weight:500">' + e.desc + '</div><div style="font-size:11px;color:var(--muted);margin-top:2px">' + e.category + ' • ' + e.date + '</div></div>' +
      '<div style="font-size:14px;font-weight:600;color:' + color + '">' + (e.type === 'Income' ? '+' : '-') + '$' + e.amount.toFixed(2) + '</div>' +
    '</div>';
  });
  html += '<button class="tool-copy" onclick="clearExpenseTracker()" style="background:#E24B4A;margin-top:10px">Clear all entries</button></div>';
  
  out.innerHTML = html;
}

function clearExpenseTracker() {
  if (!confirm('Clear all expense tracker entries? This cannot be undone.')) return;
  localStorage.removeItem('skillpay_expense_tracker');
  document.getElementById('tool-output').innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">All entries cleared. Add your first entry above.</div>';
}

// Load existing entries on tool open
if (typeof TOOL_BUILDERS !== 'undefined' && TOOL_BUILDERS['expense-tracker']) {
  var originalBuilder = TOOL_BUILDERS['expense-tracker'];
  TOOL_BUILDERS['expense-tracker'] = function() {
    setTimeout(function() {
      var entries = [];
      try { entries = JSON.parse(localStorage.getItem('skillpay_expense_tracker') || '[]'); } catch(e) {}
      if (entries.length > 0) renderExpenseTracker(entries);
    }, 100);
    return originalBuilder();
  };
}

function renderResources(filter) {
  var grid = document.getElementById('resource-grid');
  var owned = getOwned();
  var isPro = checkProStatus();
  var filtered = RESOURCES.filter(function(r) {
    if (!filter || filter === 'all') return true;
    if (filter === 'free') return r.price === 0 && !r.pro;
    return r.cat.indexOf(filter) !== -1;
  });

  grid.innerHTML = filtered.map(function(r) {
    var isOwned = owned.indexOf(r.id) !== -1;
    var isFree = r.price === 0 && !r.pro;
    var isProTool = r.pro === true;
    var isTool = r.type === 'tool';
    var canAccess = isFree || isPro || isOwned;
    
    var thumbLabel = isProTool ? 'pro' : (isTool ? 'tool' : (isFree ? 'free' : 'paid'));
    var thumbText = isProTool ? 'Pro only' : (isFree ? 'Free tool' : 'Tool');
    
    var btnClass = canAccess ? 'download' : 'pro-only';
    var btnText = canAccess ? 'Launch tool' : 'Upgrade to Pro';

    return '<div class="resource-card" data-cat="' + r.cat + '">' +
      '<div class="resource-thumb" style="background:linear-gradient(135deg,' + r.color + ',' + r.color + '88)">' +
        '<div class="resource-thumb-icon">' + r.icon + '</div>' +
        '<div class="resource-thumb-label ' + thumbLabel + '">' + thumbText + '</div>' +
      '</div>' +
      '<div class="resource-body">' +
        '<div class="resource-cat" style="color:' + r.color + '">' + (isTool ? '&#9889; Interactive tool' : r.cat.split(' ')[0]) + '</div>' +
        '<div class="resource-title">' + r.title + '</div>' +
        '<div class="resource-desc">' + r.desc + '</div>' +
        '<div class="resource-footer">' +
          '<div class="resource-price ' + (isFree ? 'free' : '') + '">' + (isProTool ? 'Pro' : 'Free') + '</div>' +
          '<button class="resource-btn ' + btnClass + '" onclick="event.stopPropagation();openResource(\'' + r.id + '\')">' + btnText + '</button>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('rs-total').textContent = RESOURCES.length;
  document.getElementById('rs-free').textContent = RESOURCES.filter(function(r){return r.price===0 && !r.pro}).length;
  document.getElementById('rs-owned').textContent = owned.length + (isPro ? RESOURCES.filter(function(r){return r.pro}).length : 0);
}

function checkProStatus() {
  // Check if user has Pro plan (you can integrate with Stripe later)
  // For now, check localStorage
  var plan = localStorage.getItem('skillpay_plan') || 'free';
  return plan === 'pro';
}

function filterResources(cat, btn) {
  document.querySelectorAll('.sf-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderResources(cat);
}

function openResource(id) {
  var r = RESOURCES.find(function(x) { return x.id === id; });
  if (!r) return;
  var owned = getOwned();
  var isOwned = owned.indexOf(r.id) !== -1;
  var isFree = r.price === 0 && !r.pro;
  var isProTool = r.pro === true;
  var isTool = r.type === 'tool';
  var isPro = checkProStatus();
  var canAccess = isFree || isPro || isOwned;

  document.getElementById('pm-title').textContent = r.title;
  document.getElementById('pm-cat').textContent = isTool ? '⚡ Interactive tool' : r.cat.split(' ')[0];
  document.getElementById('pm-cat').style.color = r.color;

  if (isTool && canAccess) {
    // Show the interactive tool
    var builder = TOOL_BUILDERS[r.id];
    if (builder) {
      document.getElementById('pm-desc').innerHTML = '<div style="font-size:13px;color:var(--muted);margin-bottom:16px">' + r.desc + '</div>' + builder();
      document.getElementById('pm-includes').innerHTML = '';
      document.getElementById('pm-price').style.display = 'none';
      document.getElementById('pm-btn').style.display = 'none';
    } else {
      document.getElementById('pm-desc').textContent = r.desc;
      showResourceIncludes(r, canAccess, isProTool);
    }
  } else if (isProTool && !isPro) {
    // Show Pro upgrade prompt
    document.getElementById('pm-desc').textContent = r.desc;
    var includesHTML = '<h4>What\'s included:</h4>';
    r.includes.forEach(function(item) {
      includesHTML += '<div class="pmi-item"><div class="pmi-icon">&#10003;</div>' + item + '</div>';
    });
    includesHTML += '<div style="margin-top:16px;padding:14px;background:rgba(201,147,58,0.08);border-radius:10px;border:1px solid rgba(201,147,58,0.2)"><div style="font-size:12px;font-weight:600;color:var(--gold);margin-bottom:4px">🌟 Pro exclusive</div><div style="font-size:12px;color:var(--muted);line-height:1.6">This tool is available with a Pro subscription. Unlock all 6 premium tools + 8 advanced courses for $10.99/month.</div></div>';
    document.getElementById('pm-includes').innerHTML = includesHTML;
    
    var priceEl = document.getElementById('pm-price');
    var btnEl = document.getElementById('pm-btn');
    priceEl.style.display = '';
    btnEl.style.display = '';
    priceEl.textContent = 'Pro only';
    priceEl.className = 'preview-modal-price';
    priceEl.style.color = 'var(--gold)';
    btnEl.textContent = 'Upgrade to Pro — $10.99/mo';
    btnEl.className = 'preview-modal-btn pro-only';
    btnEl.onclick = function() { 
      window.location.href = 'skillpay-account.html?upgrade=pro';
    };
  } else {
    document.getElementById('pm-desc').textContent = r.desc;
    showResourceIncludes(r, canAccess, isProTool);
  }

  document.getElementById('preview-overlay').classList.add('show');
}

function showResourceIncludes(r, canAccess, isProTool) {
  var includesHTML = '<h4>What\'s included:</h4>';
  r.includes.forEach(function(item) {
    includesHTML += '<div class="pmi-item"><div class="pmi-icon">&#10003;</div>' + item + '</div>';
  });
  document.getElementById('pm-includes').innerHTML = includesHTML;

  var priceEl = document.getElementById('pm-price');
  var btnEl = document.getElementById('pm-btn');
  priceEl.style.display = '';
  btnEl.style.display = '';

  if (canAccess) {
    priceEl.textContent = isProTool ? 'Pro' : 'Free';
    priceEl.className = 'preview-modal-price free';
    btnEl.textContent = r.type === 'tool' ? 'Launch tool' : 'Download';
    btnEl.className = 'preview-modal-btn download';
    btnEl.onclick = function() { if (r.type === 'tool') { openResource(r.id); } else { claimResource(r); } };
  } else {
    priceEl.textContent = 'Pro only';
    priceEl.className = 'preview-modal-price';
    priceEl.style.color = 'var(--gold)';
    btnEl.textContent = 'Upgrade to Pro';
    btnEl.className = 'preview-modal-btn pro-only';
    btnEl.onclick = function() { window.location.href = 'skillpay-account.html?upgrade=pro'; };
  }
}

function closePreview() {
  document.getElementById('preview-overlay').classList.remove('show');
}

function getOwned() {
  try { return JSON.parse(localStorage.getItem('skillpay_owned_resources') || '[]'); } catch(e) { return []; }
}

function claimResource(r) {
  var owned = getOwned();
  if (owned.indexOf(r.id) === -1) {
    owned.push(r.id);
    localStorage.setItem('skillpay_owned_resources', JSON.stringify(owned));
  }
  closePreview();
  renderResources('all');
}

function downloadResource(r) {
  alert('Resource: ' + r.title + '\n\nIn production, this would download the actual file. For now, the resource is marked as owned in your account.');
}

// Theme
(function(){
  var t = localStorage.getItem('skillpay_theme');
  if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
})();

// Mobile menu
function toggleMobileMenu(btn) {
  btn.classList.toggle('open');
  document.getElementById('mobile-menu').classList.toggle('open');
}

// AUTOMATICALLY GRANT PRO ACCESS FOR TESTING
localStorage.setItem('skillpay_pro_access', 'true');
localStorage.setItem('skillpay_pro', 'true');
localStorage.setItem('skillpay_plan', 'pro');

// Init
renderResources('all');
</script>

</body>
</html>
